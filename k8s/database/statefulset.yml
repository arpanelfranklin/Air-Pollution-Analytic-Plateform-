kind: StatefulSet
apiVersion: apps/v1
metadata: 
  name: mongo-statefulset
  namespace: airpollution 
spec: 
  selector: 
    matchLabels: 
      app: mongo
  serviceName: mongo-service
  replicas: 1
  template: 
    metadata: 
      labels: 
        app: mongo
    spec: 
        containers: 
          - name: mongo
            image: mongo:7
            ports: 
              - containerPort: 27017
            env: 
              - name: MONGO_INITDB_ROOT_USERNAME
                valueFrom: 
                  configMapKeyRef: 
                    name: configmap 
                    key: mongo-username
              - name: MONGO_INITDB_ROOT_PASSWORD
                valueFrom: 
                  secretKeyRef: 
                    name: secret
                    key: mongo-password 
            volumeMounts: 
              - mountPath: /data/db
                name: mongo-volume
    volumes: 
          - name: mongo-volume
            persistentVolumeClaim: 
              claimName: mongo-pvc
