kind: PersistentVolume 
apiVersion: v1
metadata: 
  name: mongo-pv 
  namespace: airpollution 
  labels: 
      app: mongo-pv 
spec: 
  storageClassName: mongo-storage
  capacity: 
    storage: 5Gi
  accessModes: 
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain 
  hostPath: 
    path: /mnt/data