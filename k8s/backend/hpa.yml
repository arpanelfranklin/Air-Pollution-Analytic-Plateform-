kind: HorizontalPodAutoscaler
apiVersion: autoscaling/v2
metadata: 
  name: backend-hpa
  namespace: airpollution
spec: 
  scaleTargetRef: 
    apiVersion: apps/v1
    name: backend
    kind: Deployment
  minReplicas: 1
  maxReplicas: 10 
  metrics: 
  - type: Resource
    resources:
      name: cpu
      target: 
        type: Utilization
        averageUtilization: 50
